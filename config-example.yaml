health_check_port: 8080
server_config:
  channel_size: 100
  db_config:
    type: "postgres_config"
    connection_string: postgresql://postgres@localhost:5432/nft_marketplace
  transaction_stream_config:
    starting_version: <starting_version>
    request_ending_version: <request_ending_version>
    indexer_grpc_data_service_address: "https://grpc.mainnet.aptoslabs.com:443"
    auth_token: <auth_token>
    request_name_header: "nft_marketplace_processor"
  nft_marketplace_config:
    name: wapal
    events:
      0x584b50b999c78ade62f8359c91b5165ff390338d45f8e55969a04e65d76258c9::events::ListingPlacedEvent:
        event_fields:
          "$.listing":
            - table: nft_marketplace_activities
              column: listing_id
            - table: current_nft_marketplace_listings
              column: listing_id
          "$.seller":
            - table: nft_marketplace_activities
              column: seller
            - table: current_nft_marketplace_listings
              column: seller
          "$.price":
            - table: nft_marketplace_activities
              column: price
            - table: current_nft_marketplace_listings
              column: price
          "$.token_metadata.token.vec[0].inner":
            - table: nft_marketplace_activities
              column: token_data_id
            - table: current_nft_marketplace_listings
              column: token_data_id
          "$.token_metadata.token_name":
            - table: nft_marketplace_activities
              column: token_name
          "$.token_metadata.creator_address":
            - table: nft_marketplace_activities
              column: creator_address
          "$.token_metadata.collection_name":
            - table: nft_marketplace_activities
              column: collection_name
      0x584b50b999c78ade62f8359c91b5165ff390338d45f8e55969a04e65d76258c9::events::ListingCanceledEvent:
        event_fields:
          "$.collection.vec[0].inner":
            - table: nft_marketplace_activities
              column: collection_id
            - table: current_nft_marketplace_listings
              column: collection_id
          "$.token_metadata.token.vec[0].inner":
            - table: nft_marketplace_activities
              column: token_data_id
            - table: current_nft_marketplace_listings
              column: token_data_id
          "$.token_metadata.token_name":
            - table: nft_marketplace_activities
              column: token_name
          "$.token_metadata.creator_address":
            - table: nft_marketplace_activities
              column: creator_address
          "$.token_metadata.collection_name":
            - table: nft_marketplace_activities
              column: collection_name
          "$.price":
            - table: nft_marketplace_activities
              column: price
            - table: current_nft_marketplace_listings
              column: price
          "$.purchaser":
            - table: nft_marketplace_activities
              column: buyer
          "$.seller":
            - table: nft_marketplace_activities
              column: seller
            - table: current_nft_marketplace_listings
              column: seller
          "$.token_amount":
            - table: nft_marketplace_activities
              column: token_amount
            - table: current_nft_marketplace_listings
              column: token_amount
          "$.listing":
            - table: nft_marketplace_activities
              column: listing_id
            - table: current_nft_marketplace_listings
              column: listing_id
